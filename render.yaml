services:
  - type: web
    name: neuronic
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: starter
    envVars:
      - key: PORT
        value: "3000"
      - key: PUBLIC_URL
        value: "https://neuronic.com"
      - key: DATA_DIR
        value: "/data"
      - key: RUST_LOG
        value: "error"
    disk:
      name: neuronic-data
      mountPath: /data
      sizeGB: 1
