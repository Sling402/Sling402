<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Sling402 — $S402</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="description" content="X402 Payment Protocol. Private instant transfers on Solana.">
<meta name="theme-color" content="#FF5722">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sling402.io">
<meta property="og:site_name" content="Sling402">
<meta property="og:title" content="Sling402 — X402 Payment Protocol">
<meta property="og:description" content="Private instant transfers. X402 payment headers on Solana.">
<meta property="og:image" content="https://sling402.io/og-banner.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@Sling402">
<meta name="twitter:title" content="Sling402 — X402 Payment Protocol">
<meta name="twitter:description" content="Private instant transfers on Solana.">
<meta name="twitter:image" content="https://sling402.io/og-banner.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--acc:#FF5722;--acc2:#FF8A65;--bg:#111;--t1:#e8e8e8;--t2:#888;--t3:#444}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.gate{position:relative;z-index:10;text-align:center;max-width:420px;padding:30px 20px}
.logo-wrap{margin-bottom:28px}
.logo-wrap svg{width:80px;height:80px;filter:drop-shadow(0 0 30px rgba(255,87,34,.2))}
.title{font-family:'DM Sans',sans-serif;font-size:36px;font-weight:800;color:#fff;letter-spacing:2px;margin-bottom:4px}
.title span{color:var(--acc)}
.subtitle{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:6px;margin-bottom:32px;text-transform:uppercase}
.tag{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--acc);letter-spacing:1px;margin-bottom:8px;padding:4px 12px;display:inline-block;border:1px solid rgba(255,87,34,.15);border-radius:4px}
.desc{font-size:14px;color:var(--t2);line-height:1.8;margin-bottom:28px;font-weight:300}
.auth-box{margin-bottom:24px}
.auth-box input{width:100%;padding:14px 18px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:2px;text-align:center;outline:none;transition:all .3s;caret-color:var(--acc)}
.auth-box input::placeholder{color:rgba(255,255,255,.12);letter-spacing:4px;font-size:10px}
.auth-box input:focus{border-color:rgba(255,87,34,.3);box-shadow:0 0 40px rgba(255,87,34,.04)}
.enter-btn{width:100%;padding:14px;background:var(--acc);border:none;border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .2s;margin-top:10px}
.enter-btn:hover{background:#E64A19;box-shadow:0 8px 32px rgba(255,87,34,.25)}
.enter-btn:active{transform:scale(.98)}
.msg{font-family:'IBM Plex Mono',monospace;font-size:10px;margin-top:10px;min-height:16px}
.msg.err{color:#EF4444}.msg.ok{color:var(--acc)}
@keyframes sk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.bottom{position:fixed;bottom:18px;left:0;right:0;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:8px;color:rgba(255,255,255,.08);letter-spacing:3px}
.gate.entering{animation:go .6s ease forwards}
@keyframes go{to{opacity:0;transform:scale(1.05);filter:blur(10px)}}
/* Minimal bg */
.bg-grad{position:fixed;top:-50%;right:-30%;width:80vw;height:80vw;background:radial-gradient(circle,rgba(255,87,34,.03) 0%,transparent 70%);pointer-events:none;z-index:0}
.bg-grad2{position:fixed;bottom:-40%;left:-20%;width:60vw;height:60vw;background:radial-gradient(circle,rgba(255,87,34,.02) 0%,transparent 60%);pointer-events:none;z-index:0}
</style>
</head>
<body>
<div class="bg-grad"></div>
<div class="bg-grad2"></div>
<div class="gate" id="gate">
  <div class="logo-wrap">
    <svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" fill="#FF5722"/><circle cx="60" cy="60" r="34" fill="#1a1a1a"/><circle cx="60" cy="60" r="20" fill="#FF5722"/><circle cx="60" cy="60" r="8" fill="#1a1a1a"/></svg>
  </div>
  <div class="title"><span>Sling</span>402</div>
  <div class="subtitle">X 4 0 2&nbsp;&nbsp;P A Y M E N T S</div>
  <div class="tag">X-402-Payment-Required</div>
  <div class="desc">Private instant transfers on Solana.<br>No hidden markups. No KYC. Just pay.</div>
  <div class="auth-box">
    <input type="password" id="pw" placeholder="ENTER PASSWORD" autocomplete="off" spellcheck="false">
    <button class="enter-btn" id="enterBtn" onclick="tryAuth()">ENTER PROTOCOL</button>
    <div class="msg" id="msg"></div>
  </div>
</div>
<div class="bottom">SLING402 · X402 · SOLANA</div>
<script>
var pw=document.getElementById('pw'),msg=document.getElementById('msg'),gate=document.getElementById('gate'),btn=document.getElementById('enterBtn');
pw.addEventListener('keydown',function(e){if(e.key==='Enter')tryAuth()});
async function tryAuth(){var val=pw.value.trim();if(!val){msg.className='msg err';msg.textContent='ENTER PASSWORD';return}btn.textContent='VERIFYING...';btn.style.pointerEvents='none';try{var r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:val})});var d=await r.json();if(d.success){msg.className='msg ok';msg.textContent='ACCESS GRANTED';document.cookie='session='+d.token+';path=/;max-age=86400';sessionStorage.setItem('sling402_session',d.token);await new Promise(function(r){setTimeout(r,500)});gate.classList.add('entering');await new Promise(function(r){setTimeout(r,600)});window.location.href='/?session='+d.token}else{msg.className='msg err';msg.textContent='ACCESS DENIED';pw.value='';btn.textContent='ENTER PROTOCOL';btn.style.pointerEvents='auto'}}catch(e){msg.className='msg err';msg.textContent='CONNECTION ERROR';btn.textContent='ENTER PROTOCOL';btn.style.pointerEvents='auto'}}
</script>
</body>
</html>
